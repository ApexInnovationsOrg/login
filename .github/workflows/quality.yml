name: Quality
on:
  workflow_call:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: apex_login_test
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, redis
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Audit dependencies
        run: composer audit
      - name: Check code style
        run: vendor/bin/pint --test
      - name: Run tests
        env:
          APP_KEY: dootdootdootdootdootdootdootdoot
          DB_HOST: 127.0.0.1
          DB_USERNAME: sail
          DB_PASSWORD: password
        run: php artisan test
